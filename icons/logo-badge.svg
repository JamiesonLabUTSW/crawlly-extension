<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Shield background gradient: deep navy -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3f7a;stop-opacity:1" />
    </linearGradient>
    <!-- Inner shield lighter fill -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#163560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d8c;stop-opacity:1" />
    </linearGradient>
    <!-- Teal accent -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0098d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer shield shape -->
  <path d="M64 6 L112 24 L112 72 Q112 104 64 122 Q16 104 16 72 L16 24 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield border highlight -->
  <path d="M64 6 L112 24 L112 72 Q112 104 64 122 Q16 104 16 72 L16 24 Z"
        fill="none" stroke="#4a8fd4" stroke-width="2.5" opacity="0.6"/>

  <!-- Inner shield inset -->
  <path d="M64 14 L104 29 L104 70 Q104 98 64 114 Q24 98 24 70 L24 29 Z"
        fill="url(#innerGrad)"/>

  <!-- Teal accent divider bar -->
  <rect x="28" y="72" width="72" height="4" rx="2" fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- ETHOS text -->
  <text x="64" y="62"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="22"
        font-weight="900"
        letter-spacing="4"
        text-anchor="middle"
        fill="#ffffff">ETHOS</text>

  <!-- IRB text below divider -->
  <text x="64" y="96"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="15"
        font-weight="700"
        letter-spacing="6"
        text-anchor="middle"
        fill="#00c9a7"
        filter="url(#glow)">IRB</text>

  <!-- Subtle star/cross emblem at top of shield -->
  <polygon points="64,20 66,26 72,26 67,30 69,36 64,32 59,36 61,30 56,26 62,26"
           fill="#4a8fd4" opacity="0.5"/>
</svg>
