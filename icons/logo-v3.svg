<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2244"/>
      <stop offset="100%" style="stop-color:#1a3f7a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7"/>
      <stop offset="100%" style="stop-color:#0098d4"/>
    </linearGradient>
    <linearGradient id="exportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ba"/>
      <stop offset="100%" style="stop-color:#00a8e8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="5" y="5" width="118" height="118" rx="16" ry="16"
        fill="none" stroke="#2a5a9a" stroke-width="1.5" opacity="0.5"/>

  <!-- Top divider accent line -->
  <rect x="16" y="44" width="96" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.4"/>

  <!-- ETHOS text -->
  <text x="64" y="38"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="21"
        font-weight="900"
        letter-spacing="5"
        text-anchor="middle"
        fill="#ffffff">ETHOS</text>

  <!-- IRB text -->
  <text x="64" y="58"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="13"
        font-weight="700"
        letter-spacing="7"
        text-anchor="middle"
        fill="#00c9a7"
        filter="url(#glow)">IRB</text>

  <!-- Bottom divider accent line -->
  <rect x="16" y="63" width="96" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.4"/>

  <!-- Export symbol: tray base + arrow pointing up-and-out -->
  <!-- Tray / document base -->
  <rect x="38" y="100" width="52" height="7" rx="3" fill="url(#exportGrad)" filter="url(#shadow)"/>
  <!-- Tray left wall -->
  <rect x="38" y="88" width="6" height="14" rx="2" fill="url(#exportGrad)" opacity="0.7"/>
  <!-- Tray right wall -->
  <rect x="84" y="88" width="6" height="14" rx="2" fill="url(#exportGrad)" opacity="0.7"/>

  <!-- Arrow shaft going upward from tray -->
  <line x1="64" y1="97" x2="64" y2="75"
        stroke="url(#exportGrad)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Arrow head (pointing up) -->
  <polyline points="52,84 64,71 76,84"
            stroke="url(#exportGrad)" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#glow)"/>
</svg>
