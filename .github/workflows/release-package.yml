name: Release Package

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create/update a GitHub Release for this ref"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest and security
        run: npm run validate:manifest && npm run security:check

      - name: Resolve version
        id: version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "manifest.json version ($VERSION) does not match package.json version ($PACKAGE_VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${{ steps.version.outputs.version }}" >&2
            exit 1
          fi

      - name: Build package
        run: npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ethos-irb-exporter-v${{ steps.version.outputs.version }}
          path: dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="dist/ethos-irb-exporter-v${{ steps.version.outputs.version }}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" \
              --title "ETHOS IRB Exporter $TAG" \
              --notes "Packaged browser extension zip for ETHOS IRB Exporter $TAG." \
              --target "$GITHUB_SHA"
          fi
